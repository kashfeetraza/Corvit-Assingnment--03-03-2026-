<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Plan Pricing Card</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Pricing Card -->
  <div class="bg-white rounded-xl shadow-md p-8 w-80 text-center 
              transform transition-all duration-300
              hover:-translate-y-2 hover:shadow-xl">

    <h2 class="text-2xl font-bold mb-2">Pro Plan</h2>

    <p class="text-gray-500 mb-6">Perfect for growing startups</p>

    <p class="text-4xl font-extrabold mb-6">
      $29 <span class="text-base font-medium text-gray-500">/month</span>
    </p>

    <ul class="text-gray-600 mb-6 space-y-2">
      <li>✔ Unlimited Projects</li>
      <li>✔ Priority Support</li>
      <li>✔ Advanced Analytics</li>
    </ul>

    <!-- Subscribe Button -->
    <button class="bg-blue-600 text-white px-6 py-3 rounded-lg 
                   hover:bg-blue-700 transition-colors duration-300">
      Subscribe
    </button>

  </div>

</body>
</html>
